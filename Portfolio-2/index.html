<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio 2</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="#" class="brand">
          <img
            src="./images/profilePicture.PNG"
            alt="Profile Image John Sr"
            class="brand__img"
          />
          <span class="brand__name">John Probus Sr</span>
        </a>

        <nav class="site-nav" aria-label="Primary">
          <a href="#home">Home</a>
          <a href="#projects">Projects</a>
          <a href="#about">About</a>
          <a href="#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main id="home">
      <section class="hero" aria-labelledby="hero-title">
        <div class="container hero-inner">
          <div class="hero-content">
            <h1 id="hero-title">
              Front-End Developer | HTML, CSS, and JavaScript
            </h1>
            <p class="hero-subtitle">
              Focused on building responsive, accessible web applications while
              strengthening my foundation in modern JavaScript and front-end
              architecture.
            </p>

            <a href="#projects" class="btn">See my projects</a>

            <div class="social-rail" aria-label="Social links">
            <a href="#" aria-label="LinkedIn" target="_blank" rel="no-referrer">
              <i class="fa-brands fa-linkedin-in"></i>
            </a>
            <a href="#" aria-label="GitHub" target="_blank" rel="no-referrer">
              <i class="fa-brands fa-github"></i
            ></a>
          </div>
          </div>
        </div>
      </section>
    </main>

</html>
